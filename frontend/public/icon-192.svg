<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4711e"/>
      <stop offset="1" stop-color="#e2540a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#orange)"/>
  <!-- subtle blueprint grid -->
  <g stroke="rgba(255,255,255,0.10)" stroke-width="1">
    <path d="M128 0V512 M256 0V512 M384 0V512 M0 128H512 M0 256H512 M0 384H512"/>
  </g>
  <!-- overlapping SS monogram -->
  <text x="200" y="330" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="300" font-weight="700" fill="#ffffff" opacity="0.97">S</text>
  <text x="312" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="300" font-weight="700" fill="#ffffff">S</text>
  <!-- TRADERS wordmark -->
  <text x="256" y="452" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="46" font-weight="700" letter-spacing="14" fill="#2c2418">TRADERS</text>
</svg>
